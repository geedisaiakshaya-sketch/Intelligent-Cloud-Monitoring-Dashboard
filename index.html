<!DOCTYPE html>
<html>
<head>
    <title>Intelligent Cloud Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Intelligent Cloud Monitoring Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>CPU Usage</h2>
        <p id="cpu">Loading...</p>
    </div>

    <div class="card">
        <h2>Memory Usage</h2>
        <p id="memory">Loading...</p>
    </div>

    <div class="card">
        <h2>Network Usage</h2>
        <p id="network">Loading...</p>
    </div>

    <div class="card">
        <h2>Estimated Cost</h2>
        <p id="cost">Loading...</p>
    </div>

    <div class="card">
    <h2>System Status</h2>
    <p id="status">Loading...</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
